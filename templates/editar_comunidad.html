<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Editar Comunidad — ECORuta</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/estilos_ecoruta.css') }}">

</head>

<body>

<header class="encabezado">

    <nav class="menu">

        <h2>🚛 ECORuta</h2>

        <ul>

            <li><a href="/">Inicio</a></li>

            <li><a href="/comunidades">Comunidades</a></li>

            <li><a href="/ver_comunidades_lista">Lista de comunidades</a></li>

        </ul>

    </nav>

    <section class="hero">

        <h1>✏️ Editar Comunidad</h1>

        <p>Modifica la información de la comunidad.</p>

    </section>

</header>

<main>

<section class="seccion">

<form method="POST">

<div class="form-group">

<label>Nombre</label>

<input
type="text"
name="nombre"
value="{{ comunidad.nombre }}"
required>

</div>

<div class="form-group">

<label>Ubicación</label>

<input
type="text"
name="ubicacion"
value="{{ comunidad.ubicacion }}"
required>

</div>

<div class="form-group">

<label>Número de habitantes</label>

<input
type="number"
name="habitantes"
value="{{ comunidad.habitantes }}"
required>

</div>

<div class="form-group">

<label>Tipo</label>

<select name="tipo">

<option value="urbana"
{% if comunidad.tipo=="urbana" %}
selected
{% endif %}
>

Urbana

</option>

<option value="rural"
{% if comunidad.tipo=="rural" %}
selected
{% endif %}
>

Rural

</option>

</select>

</div>

<br>

<button
type="submit"
class="boton-principal">

💾 Guardar Cambios

</button>

<a href="/ver_comunidades_lista">

<button
type="button"
class="boton-secundario">

❌ Cancelar

</button>

</a>

</form>

</section>

</main>

<footer>

<p>

🚛 ECORuta | San José del Rincón — 2026

</p>

</footer>

</body>
</html>
